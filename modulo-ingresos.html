<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<div class="row g-4 animate__animated animate__fadeIn">
    <div class="col-md-7">
        <div class="p-4 rounded" style="background-color: #1e293b; border: 1px solid #334155;">
            <h5 class="fw-bold text-white mb-3">
                <i class="fa-solid fa-camera me-2 text-success"></i>Lector QR — Ingreso al Evento
            </h5>
            <div id="qr-reader" style="width: 100%; border-radius: 8px; overflow: hidden;"></div>
            <div class="mt-3">
                <label class="form-label small text-muted fw-semibold">O ingresa manualmente el código QR:</label>
                <div class="input-group">
                    <input type="text" id="input-codigo-manual" class="form-control bg-dark text-white border-secondary" placeholder="CCA-XXXXX" onkeydown="if(event.key==='Enter')buscarPorCodigoManual()">
                    <button class="btn btn-outline-success" onclick="buscarPorCodigoManual()"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
            </div>
            <div id="qr-mensaje" class="mt-3"></div>
        </div>
    </div>

    <div class="col-md-5">
        <div class="p-4 rounded" style="background-color: #1e293b; border: 1px solid #334155;" id="panel-resultado">
            <h5 class="fw-bold text-white mb-3">
                <i class="fa-solid fa-circle-info me-2 text-info"></i>Datos del Asistente
            </h5>
            <div id="contenido-asistente" class="text-center text-muted py-5">
                <i class="fa-solid fa-qrcode fa-3x mb-3 d-block opacity-50"></i>
                <span>Esperando lectura de código QR...</span>
            </div>
        </div>
    </div>
</div>

<script>
    let html5QrCode = null;
    let ultimoAsistenteEncontrado = null;

    async function inicializarIngresos() {
        iniciarEscannerQR();
    }

    function iniciarEscannerQR() {
        const readerEl = document.getElementById("qr-reader");
        readerEl.innerHTML = "";
        document.getElementById("input-codigo-manual").value = "";
        document.getElementById("qr-mensaje").innerHTML = "";

        html5QrCode = new Html5Qrcode("qr-reader");
        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 60, qrbox: { width: 250, height: 250 } },
            onScanSuccess
        ).catch(err => {
            document.getElementById("qr-mensaje").innerHTML =
                `<div class="alert alert-warning py-2 small m-0">⚠️ No se pudo acceder a la cámara. Usa el ingreso manual.</div>`;
        });
    }

    async function onScanSuccess(codigo) {
        if (html5QrCode) {
            await html5QrCode.stop();
        }
        await buscarAsistente(codigo);
    }

    async function buscarPorCodigoManual() {
        const codigo = document.getElementById("input-codigo-manual").value.trim();
        if (!codigo) return;
        await buscarAsistente(codigo);
    }

    async function buscarAsistente(codigo) {
        const panel = document.getElementById("contenido-asistente");
        const mensaje = document.getElementById("qr-mensaje");
        mensaje.innerHTML = "";

        panel.innerHTML = `<div class="py-4"><i class="fa-solid fa-spinner fa-spin fa-2x"></i><p class="mt-2">Verificando código...</p></div>`;

        try {
            const { data, error } = await window.supabaseClient
                .from('asistentes')
                .select('*')
                .eq('codigo_qr', codigo)
                .single();

            if (error || !data) {
                panel.innerHTML = `
                    <div class="text-center py-4">
                        <i class="fa-solid fa-circle-exclamation fa-3x text-danger mb-3"></i>
                        <h6 class="text-danger fw-bold">Código no válido</h6>
                        <p class="small text-muted">No se encontró ningún asistente con el código <code>${codigo}</code></p>
                        <button class="btn btn-outline-light btn-sm mt-3" onclick="iniciarEscannerQR()"><i class="fa-solid fa-camera me-1"></i>Nuevo Escaneo</button>
                    </div>`;
                return;
            }

            ultimoAsistenteEncontrado = data;
            const yaIngreso = data.ingreso === true;

            panel.innerHTML = `
                <div class="text-center">
                    <div class="mb-3">
                        <i class="fa-solid fa-user-circle fa-4x ${yaIngreso ? 'text-success' : 'text-info'}"></i>
                    </div>
                    <h5 class="fw-bold text-white">${data.nombre_completo}</h5>
                    <p class="text-muted small">${data.empresa_medio || ''}</p>
                    <hr class="border-secondary">
                    <div class="row text-start small">
                        <div class="col-5 text-muted">Documento</div>
                        <div class="col-7 text-white fw-semibold">${data.documento}</div>
                        <div class="col-5 text-muted mt-1">Perfil</div>
                        <div class="col-7 mt-1"><span class="badge ${data.perfil_entrada === 'VIP / Visitante' ? 'bg-info' : 'bg-warning text-dark'}">${data.perfil_entrada}</span></div>
                        <div class="col-5 text-muted mt-1">Código QR</div>
                        <div class="col-7 text-success fw-bold mt-1">${data.codigo_qr}</div>
                        <div class="col-5 text-muted mt-1">Estado</div>
                        <div class="col-7 mt-1">
                            <span class="badge ${yaIngreso ? 'bg-success' : 'bg-secondary'}">
                                ${yaIngreso ? '✓ Ingresado' : 'Pendiente'}
                            </span>
                        </div>
                        ${yaIngreso && data.ingreso_timestamp ? `
                        <div class="col-5 text-muted mt-1">Ingresó</div>
                        <div class="col-7 mt-1 text-white-50 small">${new Date(data.ingreso_timestamp).toLocaleString('es-CO')}</div>` : ''}
                    </div>
                    ${!yaIngreso ? `
                    <button class="btn btn-success w-100 mt-3 fw-bold" onclick="confirmarIngreso()">
                        <i class="fa-solid fa-check-circle me-2"></i>Confirmar Ingreso
                    </button>` : `
                    <div class="alert alert-success py-2 mt-3 small m-0">
                        <i class="fa-solid fa-check-circle me-1"></i>Este asistente ya ingresó al evento.
                    </div>`}
                    <button class="btn btn-outline-light btn-sm mt-2 w-100" onclick="iniciarEscannerQR()"><i class="fa-solid fa-camera me-1"></i>Nuevo Escaneo</button>
                </div>`;
        } catch (err) {
            panel.innerHTML = `<div class="text-center py-4 text-danger">Error: ${err.message}</div>`;
        }
    }

    async function confirmarIngreso() {
        const a = ultimoAsistenteEncontrado;
        if (!a) return;

        const btn = document.querySelector("#contenido-asistente button");
        if (btn) { btn.disabled = true; btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin me-2"></i>Registrando...`; }

        try {
            const { error } = await window.supabaseClient
                .from('asistentes')
                .update({ ingreso: true, ingreso_timestamp: new Date().toISOString() })
                .eq('id', a.id);

            if (error) throw error;

            document.getElementById("qr-mensaje").innerHTML =
                `<div class="alert alert-success py-2 m-0"><i class="fa-solid fa-check-circle me-1"></i>✓ Ingreso registrado exitosamente para <strong>${a.nombre_completo}</strong></div>`;

            await buscarAsistente(a.codigo_qr);
        } catch (err) {
            document.getElementById("qr-mensaje").innerHTML =
                `<div class="alert alert-danger py-2 m-0">Error al registrar ingreso: ${err.message}</div>`;
            if (btn) { btn.disabled = false; btn.innerHTML = `<i class="fa-solid fa-check-circle me-2"></i>Confirmar Ingreso`; }
        }
    }

    function detenerEscanner() {
        if (html5QrCode) {
            try { html5QrCode.stop(); } catch(e) {}
        }
    }

    document.addEventListener('visibilitychange', () => {
        if (document.hidden) detenerEscanner();
    });
</script>
