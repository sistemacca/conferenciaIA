<div class="animate__animated animate__fadeIn">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold text-white m-0" style="letter-spacing: -0.02em;">Control de Acceso Computarizado (IA)</h4>
            <p class="text-muted small m-0">Escanee credenciales QR o digite tokens seriales de contingencia.</p>
        </div>
        <div class="px-3 py-1 rounded-pill small fw-bold" style="background: rgba(96, 239, 255, 0.1); color: #60efff; border: 1px solid rgba(96, 239, 255, 0.2); letter-spacing: 1px;">
            <i class="fa-solid fa-microchip me-1"></i> ENGINE V2 ACTIVE
        </div>
    </div>

    <div class="row g-4 justify-content-center">
        <div class="col-xl-6 col-lg-8">
            <div class="p-4 text-center" style="background: rgba(17, 24, 39, 0.85); backdrop-filter: blur(12px); border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.4);">
                
                <form id="form-buscar-manual" onsubmit="validarAccesoManualAdmin(event)" class="mb-4">
                    <div class="input-group">
                        <input type="text" id="txt-codigo-manual" class="form-control text-center text-white fw-bold" placeholder="DIGITAR SERIAL (Ej: TWA2)" maxlength="5" required autocomplete="off" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(96, 239, 255, 0.3); border-radius: 50px; font-size: 1.3rem; letter-spacing: 3px;">
                        <button type="submit" class="btn ms-2 px-4" style="background: linear-gradient(135deg, #00ff87, #60efff); color: #0b0f19; border: none; border-radius: 50px; font-weight: bold;">
                            <i class="fa-solid fa-bolt"></i>
                        </button>
                    </div>
                </form>

                <div class="mb-3" style="position: relative; padding: 5px; background: linear-gradient(135deg, rgba(0, 255, 135, 0.2), rgba(96, 239, 255, 0.2)); border-radius: 18px;">
                    <div id="reader-admin" style="width: 100%; border-radius: 14px; overflow: hidden; background: #000;"></div>
                </div>

                <div id="box-resultado-admin" class="p-3 text-center rounded-3" style="display: none; animation: zoomIn 0.3s ease;">
                    <div id="res-icono-admin" class="mb-2"></div>
                    <h5 id="res-titulo-admin" class="fw-bold mb-1">Procesando...</h5>
                    <p id="res-detalles-admin" class="m-0 small">Validando token cuántico...</p>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    // Variables locales controladas por el Admin global
    let escaneandoActivoAdmin = true;
    let audioCtxAdmin = null;

    function reproducirAudioIA(tipo) {
        try {
            if (!audioCtxAdmin) audioCtxAdmin = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtxAdmin.createOscillator();
            const gain = audioCtxAdmin.createGain();
            osc.connect(gain);
            gain.connect(audioCtxAdmin.destination);
            const ahora = audioCtxAdmin.currentTime;

            if (tipo === 'exito') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, ahora); // D5
                osc.frequency.setValueAtTime(880, ahora + 0.06); // A5
                gain.gain.setValueAtTime(0.25, ahora);
                gain.gain.exponentialRampToValueAtTime(0.01, ahora + 0.2);
                osc.start(ahora); osc.stop(ahora + 0.2);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, ahora);
                osc.frequency.linearRampToValueAtTime(90, ahora + 0.25);
                gain.gain.setValueAtTime(0.2, ahora);
                gain.gain.exponentialRampToValueAtTime(0.01, ahora + 0.3);
                osc.start(ahora); osc.stop(ahora + 0.3);
            }
        } catch (e) { console.log("Audio bloqueado:", e); }
    }

    function hablarVozIA(texto) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const mensaje = new SpeechSynthesisUtterance(texto);
            mensaje.lang = 'es-MX';
            mensaje.rate = 1.0;
            mensaje.pitch = 1.1;
            window.speechSynthesis.speak(mensaje);
        }
    }

    async function validarAccesoManualAdmin(event) {
        if(event) event.preventDefault();
        const input = document.getElementById("txt-codigo-manual");
        const codigo = input.value.trim().toUpperCase();
        if(!codigo) return;
        input.value = "";
        await procesarIngresoPuertaIA(codigo);
    }

    async function procesarIngresoPuertaIA(tokenCorto) {
        escaneandoActivoAdmin = false;
        const box = document.getElementById("box-resultado-admin");
        box.style.display = "block";
        box.style.background = "rgba(255,255,255,0.05)";
        box.style.border = "1px solid rgba(255,255,255,0.1)";
        box.style.color = "#fff";
        
        document.getElementById("res-titulo-admin").innerText = "ANALIZANDO...";
        document.getElementById("res-detalles-admin").innerText = "Buscando nodo de identificación...";
        document.getElementById("res-icono-admin").innerHTML = `<i class="fa-solid fa-atom fa-spin fa-2x" style="color:#60efff;"></i>`;

        try {
            // Buscamos usando el cliente global de Supabase ya instanciado en admin.html
            const { data, error } = await supabaseClient
                .from('inscritos')
                .select('*')
                .eq('codigo_qr', tokenCorto)
                .single();

            if (error || !data) {
                reproducirAudioIA('error');
                hablarVozIA("Código desconocido.");
                box.style.background = "rgba(132, 32, 41, 0.25)";
                box.style.border = "1px solid #ff4d4d";
                box.style.color = "#ff4d4d";
                document.getElementById("res-icono-admin").innerHTML = `<i class="fa-solid fa-user-slash fa-2x"></i>`;
                document.getElementById("res-titulo-admin").innerText = "ACCESO DENEGADO";
                document.getElementById("res-detalles-admin").innerText = `El código [${tokenCorto}] no existe en los registros.`;
            } else {
                if (data.ingreso === true || data.conteo_ingresos > 0) {
                    reproducirAudioIA('duplicado');
                    hablarVozIA("Ingreso previamente registrado.");
                    box.style.background = "rgba(102, 77, 3, 0.25)";
                    box.style.border = "1px solid #fbc531";
                    box.style.color = "#fbc531";
                    document.getElementById("res-icono-admin").innerHTML = `<i class="fa-solid fa-clone fa-2x"></i>`;
                    document.getElementById("res-titulo-admin").innerText = "INGRESO REPETIDO";
                    document.getElementById("res-detalles-admin").innerText = `${data.nombre_completo} ya cruzó este punto de control.`;
                } else {
                    const { error: errorUpdate } = await supabaseClient
                        .from('inscritos')
                        .update({
                            ingreso: true,
                            conteo_ingresos: 1,
                            ingreso_timestamp: new Date().toISOString()
                        })
                        .eq('id', data.id);

                    if (errorUpdate) throw errorUpdate;

                    reproducirAudioIA('exito');
                    hablarVozIA(`Acceso verificado. Bienvenido ${data.nombre_completo}.`);
                    
                    box.style.background = "rgba(15, 81, 50, 0.25)";
                    box.style.border = "1px solid #00ff87";
                    box.style.color = "#38ef7d";
                    document.getElementById("res-icono-admin").innerHTML = `<i class="fa-solid fa-user-check fa-2x"></i>`;
                    document.getElementById("res-titulo-admin").innerText = "¡ACCESO CONCEDIDO!";
                    document.getElementById("res-detalles-admin").innerHTML = `
                        <span class="text-white fw-bold d-block mb-1">${data.nombre_completo}</span>
                        <small class="text-muted">${data.empresa_medio} — <strong>${data.perfil_entrada}</strong></small>
                    `;
                }
            }
        } catch (err) {
            console.error(err);
            reproducirAudioIA('error');
            box.style.background = "rgba(132, 32, 41, 0.25)";
            document.getElementById("res-titulo-admin").innerText = "FALLA DE CONEXIÓN";
            document.getElementById("res-detalles-admin").innerText = err.message;
        }
        setTimeout(() => { escaneandoActivoAdmin = true; }, 3000);
    }

    // Inicializar lector de cámara acoplado al módulo interno
    function arrancarHardwareCamaraAdmin() {
        if(typeof Html5Qrcode !== 'undefined') {
            const html5QrcodeScanner = new Html5Qrcode("reader-admin");
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                { fps: 60, qrbox: { width: 220, height: 220 } },
                (textoDecodificado) => {
                    if (!escaneandoActivoAdmin) return;
                    procesarIngresoPuertaIA(textoDecodificado.trim().toUpperCase());
                }
            ).catch(err => console.log("La pestaña perdió foco o la cámara está en uso."));
        }
    }

    // Retraso controlado para permitir que el DOM renderice el div de la cámara
    setTimeout(arrancarHardwareCamaraAdmin, 400);
</script>
