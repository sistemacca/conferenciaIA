<div class="row g-4 animate__animated animate__fadeIn">
    <div class="col-lg-4">
        <div class="card border-0 shadow-sm p-4" style="border-radius: 16px; background-color: var(--bg-tarjetas);">
            <h5 class="fw-bold mb-3 text-dark"><i class="fa-solid fa-user-plus me-2 text-success"></i>Inscripción Manual</h5>
            <form id="form-asistente" onsubmit="registrarAsistenteNube(event)">
                <div class="mb-2">
                    <label class="form-label small fw-semibold text-muted">Asignar al Evento</label>
                    <select id="as-event-id" class="form-select" required></select>
                </div>
                <div class="mb-2">
                    <label class="form-label small fw-semibold text-muted">Nombre Completo</label>
                    <input type="text" id="as-nombre" class="form-control" required placeholder="Nombre">
                </div>
                <div class="mb-2">
                    <label class="form-label small fw-semibold text-muted">Documento Identidad</label>
                    <input type="text" id="as-doc" class="form-control" required placeholder="Cédula">
                </div>
                <div class="mb-2">
                    <label class="form-label small fw-semibold text-muted">Empresa / Medio</label>
                    <input type="text" id="as-empresa" class="form-control" required placeholder="Entidad">
                </div>
                <div class="mb-2">
                    <label class="form-label small fw-semibold text-muted">Correo Electrónico</label>
                    <input type="email" id="as-correo" class="form-control" required placeholder="Correo">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-muted">Perfil de Entrada</label>
                    <select id="as-perfil" class="form-select">
                        <option value="Usuario / Visitante">Usuario / Visitante General</option>
                        <option value="Invitado Especial">Invitado Especial (VIP)</option>
                        <option value="Medios de Comunicación">Medios / Prensa</option>
                    </select>
                </div>
                <button type="submit" id="btn-guardar-asistente" class="btn btn-success text-white w-100 shadow-sm">
                    <i class="fa-solid fa-user-check me-2"></i>Registrar e Imprimir
                </button>
            </form>
        </div>
    </div>

    <div class="col-lg-8">
        <div class="card border-0 shadow-sm p-4" style="border-radius: 16px; background-color: var(--bg-tarjetas);">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold text-dark m-0"><i class="fa-solid fa-list-check me-2 text-secondary"></i>Base de Datos en Tiempo Real</h5>
                <button class="btn btn-sm btn-outline-secondary rounded-pill px-3" onclick="cargarTablaAsistentes()"><i class="fa-solid fa-rotate me-1"></i>Refrescar</button>
            </div>
            <div class="table-responsive" style="max-height: 400px; overflow-y: auto;">
                <table class="table align-middle" id="tabla-asistentes-nube">
                    <thead>
                        <tr class="text-muted small">
                            <th>Asistente / Empresa</th><th>Código de Ingreso</th><th>Perfil</th><th class="text-end">Escarapela</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
