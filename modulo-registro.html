<div class="row g-4 animate__animated animate__fadeIn">
    <div class="col-lg-5">
        <div class="card border-0 shadow-sm p-4" style="border-radius: 16px; background-color: var(--bg-tarjetas);">
            <h5 class="fw-bold mb-3 text-dark"><i class="fa-solid fa-calendar-plus me-2 text-success"></i>Crear Nuevo Evento</h5>
            <form id="form-crear-evento" onsubmit="crearEventoNube(event)">
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-muted">Nombre del Evento</label>
                    <input type="text" id="ev-nombre" class="form-control" required placeholder="Ej: Feria de Emprendimiento 2026">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-muted">Fecha del Evento</label>
                    <input type="date" id="ev-fecha" class="form-control" required>
                </div>
                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label small fw-semibold text-muted">Capacidad Máx.</label>
                        <input type="number" id="ev-capacidad" class="form-control" value="500">
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label small fw-semibold text-muted">Prefijo QR</label>
                        <input type="text" id="ev-prefijo" class="form-control" value="CCA" max="5">
                    </div>
                </div>
                <button type="submit" id="btn-guardar-evento" class="btn btn-success text-white w-100 mt-2 shadow-sm">
                    <i class="fa-solid fa-floppy-disk me-2"></i>Guardar Evento en Supabase
                </button>
            </form>
        </div>
    </div>

    <div class="col-lg-7">
        <div class="card border-0 shadow-sm p-4" style="border-radius: 16px; background-color: var(--bg-tarjetas);">
            <h5 class="fw-bold mb-3 text-dark"><i class="fa-solid fa-clock-rotate-left me-2 text-secondary"></i>Historial de Eventos</h5>
            <div class="table-responsive" style="max-height: 295px; overflow-y: auto;">
                <table class="table align-middle" id="tabla-eventos-nube">
                    <thead>
                        <tr class="text-muted small">
                            <th>Nombre</th><th>Fecha</th><th class="text-center">Aforo</th><th class="text-center">Prefijo</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
