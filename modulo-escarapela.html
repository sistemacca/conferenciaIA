<!-- ══════════════════════════════════════════════════════
     MÓDULO: ESCARAPELA DE IDENTIFICACIÓN v4
     Diseño profesional · Cámara de Comercio de Arauca
════════════════════════════════════════════════════════ -->

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { background: #fff; }

.esc-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 8px 0;
}

#esc-vacia {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 64px 20px; gap: 14px; color: #94a3b8;
}
#esc-vacia i { font-size: 2.8rem; opacity: .25; }
#esc-vacia p { font-size: .83rem; text-align: center; max-width: 260px; margin: 0; line-height: 1.6; }

/* ── TARJETA PRINCIPAL ── */
#esc-card {
    width: 100%;
    max-width: 400px;
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid #d1d5db;
    font-family: Arial, 'Helvetica Neue', sans-serif;
    box-shadow: 0 12px 32px rgba(15, 23, 42, .10);
}
#esc-card.d-none { display: none; }

/* ── HEADER VERDE ── */
#esc-header {
    background: #007D42;
    color: #fff;
    padding: 14px 18px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    transition: background .3s;
}
.esc-org {
    font-size: 8.5px; font-weight: 700; letter-spacing: .15em;
    text-transform: uppercase; opacity: .75; margin-bottom: 3px;
}
.esc-evnm {
    font-size: 13.5px; font-weight: 800; line-height: 1.25;
    letter-spacing: -.01em;
}
.esc-meta {
    display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap;
}
.esc-meta span {
    font-size: 9.5px; opacity: .88;
    display: flex; align-items: center; gap: 4px;
}
.esc-meta i { font-size: 8px; opacity: .8; }

.esc-logo-box {
    width: 48px; height: 48px; border-radius: 8px;
    background: rgba(255, 255, 255, 0.2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; overflow: hidden;
    padding: 4px;
}
.esc-logo-box img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    filter: brightness(0) invert(1); /* Mantiene el logo blanco para el diseño */
}

/* ── BARRA ACENTO ── */
#esc-barra { width: 100%; height: 5px; background: #007D42; flex-shrink: 0; transition: background .3s; }

/* ── CUERPO ── */
#esc-body {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.esc-qr-col {
    width: 100%;
    background: #f8fafc;
    border-bottom: 1px solid #e8ecf0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 22px 12px 16px; gap: 8px;
}
.esc-qr-frame {
    background: #fff; padding: 10px;
    border: 1px solid #e2e8f0; border-radius: 12px; display: inline-flex;
}
.esc-qr-frame img { display: block; width: 200px; height: 200px; }
.esc-serial-lbl { font-size: 8.5px; color: #9ca3af; text-transform: uppercase; letter-spacing: .12em; }
.esc-serial-val {
    font-family: 'Courier New', monospace; font-size: 13px; font-weight: 700;
    color: #1e293b; background: #f1f5f9; padding: 3px 10px;
    border-radius: 6px; border: 1px solid #e2e8f0; letter-spacing: .18em;
}

.esc-datos-col {
    width: 100%;
    padding: 20px 22px 18px;
    display: flex; flex-direction: column; align-items: center; text-align: center;
}
.esc-perfil-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 13px 3px 8px; border-radius: 20px;
    font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    color: #fff; background: #007D42; margin-bottom: 12px; transition: background .3s;
}
.esc-perfil-pill i { font-size: 11px; }
.esc-nombre {
    font-size: 20px; font-weight: 800; color: #0f172a;
    line-height: 1.2; letter-spacing: -.02em;
    text-transform: uppercase; margin-bottom: 4px;
}
.esc-doc  { font-size: 12.5px; font-weight: 700; color: #475569; letter-spacing: .03em; margin-bottom: 4px; }
.esc-emp  { font-size: 12.5px; color: #6b7280; line-height: 1.45; }

.esc-bottom {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 12px; padding-top: 10px; border-top: 1px solid #f1f5f9;
    width: 100%;
}
.esc-verif { display: flex; align-items: center; gap: 5px; }
.esc-verif i { font-size: 13px; color: #007D42; transition: color .3s; }
.esc-verif span { font-size: 9px; color: #9ca3af; text-transform: uppercase; letter-spacing: .1em; }
.esc-num { font-size: 9.5px; color: #d1d5db; font-family: 'Courier New', monospace; letter-spacing: .08em; }

/* ── FOOTER ── */
#esc-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 18px 6px 14px;
    background: #f8fafc; border-top: 1px solid #e8ecf0;
}
.esc-ft-brand { font-size: 8.5px; color: #9ca3af; text-transform: uppercase; letter-spacing: .12em; }
.esc-ft-dom   { font-size: 8.5px; font-weight: 700; color: #007D42; text-transform: uppercase; letter-spacing: .1em; transition: color .3s; }

@media (max-width: 480px) {
    #esc-card { border-radius: 12px; }
    .esc-evnm { font-size: 12px; }
    .esc-qr-frame img { width: 160px; height: 160px; }
    .esc-nombre { font-size: 17px; }
}
</style>

<div class="esc-wrap">

    <div id="esc-vacia">
        <i class="fa-solid fa-id-badge"></i>
        <p>Selecciona un asistente de la lista para previsualizar su credencial.</p>
    </div>

    <div id="esc-card" class="d-none">

        <!-- Header con datos del evento -->
        <div id="esc-header">
            <div>
                <div class="esc-org">Cámara de Comercio de Arauca</div>
                <div class="esc-evnm" id="m-evnm">—</div>
                <div class="esc-meta" id="m-meta"></div>
            </div>
            <div class="esc-logo-box">
                <img src="https://ccarauca.org.co/wp-content/uploads/2019/12/logo-camara-1-1-1.png" alt="Logo CCA">
            </div>
        </div>

        <div id="esc-barra"></div>

        <div id="esc-body">

            <!-- QR -->
            <div class="esc-qr-col">
                <div class="esc-qr-frame">
                    <img id="m-qr" src="" alt="QR Credencial">
                </div>
                <span class="esc-serial-lbl">Código de acceso</span>
                <span class="esc-serial-val" id="m-serial">—</span>
            </div>

            <!-- Datos del asistente -->
            <div class="esc-datos-col">
                <div style="width:100%">
                    <span class="esc-perfil-pill" id="m-pill">
                        <i class="fa-solid fa-user-check" id="m-pill-ico"></i>
                        <span id="m-pill-lbl">Asistente</span>
                    </span>
                    <div class="esc-nombre" id="m-nombre">NOMBRE COMPLETO</div>
                    <div class="esc-doc" id="m-doc"></div>
                    <div class="esc-emp" id="m-empresa"></div>
                </div>
                <div class="esc-bottom">
                    <div class="esc-verif">
                        <i class="fa-solid fa-shield-check" id="m-shield"></i>
                        <span>Credencial verificada</span>
                    </div>
                    <span class="esc-num" id="m-num">#001</span>
                </div>
            </div>

        </div>

        <div id="esc-footer">
            <span class="esc-ft-brand">Codatek · QR Control</span>
            <span class="esc-ft-dom" id="m-domain">camaraarauca.com.co</span>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.0/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
const SUPABASE_URL      = 'https://wrqvuidcstesrlkwxsfs.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndycXZ1aWRjc3Rlc3Jsa3d4c2ZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MDg1MjMsImV4cCI6MjA5NTk4NDUyM30.TFk0LkHHbrjZtZ5Dma36gSB2dtsv2aQF-lCS0_nTI9I';

// ── Listener: la página padre solicita la descarga de la credencial como imagen ──
window.addEventListener('message', (ev) => {
    if (ev && ev.data === 'descargar-pdf') {
        descargarCredencialComoPDF();
    } else if (ev && ev.data === 'descargar-credencial') {
        descargarCredencialComoImagen();
    }
});

async function descargarCredencialComoPDF() {
    const card = document.getElementById('esc-card');
    if (!card || card.classList.contains('d-none')) return;

    const a = window.asistenteSeleccionadoGlobal;
    const nombreArchivo = `Pase-${(a && a.nombre_completo) || 'Asistente'}.pdf`;

    const opciones = {
        margin:       10,
        filename:     nombreArchivo,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 3, useCORS: true },
        jsPDF:        { unit: 'mm', format: 'a5', orientation: 'portrait' }
    };

    try {
        const pdfUrl = await html2pdf().set(opciones).from(card).output('bloburl');
        window.parent.postMessage({ type: 'credencial-pdf-lista', pdfUrl, nombreArchivo }, '*');
    } catch (e) {
        window.parent.postMessage({ type: 'credencial-error', error: String(e) }, '*');
    }
}

async function descargarCredencialComoImagen() {
    const card = document.getElementById('esc-card');
    if (!card || card.classList.contains('d-none')) return;

    try {
        const qrEl = document.getElementById('m-qr');
        if (qrEl && !qrEl.complete) {
            await new Promise((resolve) => {
                qrEl.addEventListener('load', resolve, { once: true });
                qrEl.addEventListener('error', () => resolve(), { once: true });
            });
        }

        const canvas = await html2canvas(card, {
            scale: 3,
            backgroundColor: '#ffffff',
            useCORS: true,
            allowTaint: true
        });

        const a = window.asistenteSeleccionadoGlobal;
        const nombreArchivo = `credencial-${(a && a.codigo_qr) || 'invitado'}.png`;
        const dataUrl = canvas.toDataURL('image/png');

        if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'credencial-lista', dataUrl, nombreArchivo }, '*');
        }
    } catch (e) {
        console.error('No se pudo generar la imagen de la credencial', e);
        if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'credencial-error', error: String(e) }, '*');
        }
    }
}

async function cargarAsistentePorId() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) return;

    try {
        const res = await fetch(
            `${SUPABASE_URL}/rest/v1/inscritos?id=eq.${encodeURIComponent(id)}&select=*,eventos(nombre,fecha,ubicacion)`,
            {
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                    'Accept': 'application/json'
                }
            }
        );
        if (!res.ok) throw new Error('Error al cargar asistente');
        const data = await res.json();
        if (Array.isArray(data) && data.length) {
            window.asistenteSeleccionadoGlobal = data[0];
            renderizarDatosEscarapela();
        }
    } catch (e) {
        console.warn('Escarapela: carga por ID falló', e);
    }
}

function renderizarDatosEscarapela() {
    const a       = window.asistenteSeleccionadoGlobal;
    const card    = document.getElementById('esc-card');
    const vacia   = document.getElementById('esc-vacia');

    if (!a) {
        card.classList.add('d-none');
        vacia.style.display = 'flex';
        return;
    }

    vacia.style.display = 'none';
    card.classList.remove('d-none');

    // ── Datos del evento en el header ──
    const ev = a.eventos || {};
    document.getElementById('m-evnm').textContent = ev.nombre || 'Evento';

    const meta = document.getElementById('m-meta');
    meta.innerHTML = '';
    if (ev.fecha) {
        const d = new Date(ev.fecha + 'T12:00:00');
        const fechaStr = d.toLocaleDateString('es-CO', { day: 'numeric', month: 'long', year: 'numeric' });
        meta.innerHTML += `<span><i class="fa-solid fa-calendar-days"></i> ${fechaStr}</span>`;
    }
    if (ev.ubicacion) {
        meta.innerHTML += `<span><i class="fa-solid fa-location-dot"></i> ${ev.ubicacion}</span>`;
    }

    // ── Color y etiqueta según perfil ──
    let clr = '#007D42', etq = 'Asistente', ico = 'fa-user-check';
    const p = String(a.perfil_entrada || '').toLowerCase();
    if (p.includes('vip') || p.includes('invitado')) {
        clr = '#1d4ed8'; etq = a.perfil_entrada || 'Invitado VIP'; ico = 'fa-star';
    } else if (p.includes('medio') || p.includes('prensa') || p.includes('comunicaci')) {
        clr = '#b45309'; etq = a.perfil_entrada || 'Medios'; ico = 'fa-camera';
    } else if (a.perfil_entrada) {
        etq = a.perfil_entrada;
    }

    document.getElementById('esc-header').style.background = clr;
    document.getElementById('esc-barra').style.background  = clr;
    const pill = document.getElementById('m-pill');
    pill.style.background = clr;
    document.getElementById('m-pill-ico').className  = 'fa-solid ' + ico;
    document.getElementById('m-pill-lbl').textContent = etq;
    document.getElementById('m-shield').style.color   = clr;
    document.getElementById('m-domain').style.color   = clr;

    // ── Datos del asistente ──
    document.getElementById('m-nombre').textContent  = (a.nombre_completo || '').toUpperCase();
    document.getElementById('m-serial').textContent  = a.codigo_qr || '—';
    document.getElementById('m-empresa').textContent = a.empresa_medio || '';

    const docEl = document.getElementById('m-doc');
    docEl.textContent  = a.documento || '';
    docEl.style.display = a.documento ? 'block' : 'none';

    const numOrden = (a.codigo_qr || '').replace(/[^0-9]/g, '').slice(-3) || '001';
    document.getElementById('m-num').textContent = '#' + numOrden;

    // ── QR ──
    const qrEl  = document.getElementById('m-qr');
    const qrText = String(a.codigo_qr || '').trim();
    if (window.QRCode && typeof window.QRCode.toDataURL === 'function' && qrText) {
        window.QRCode.toDataURL(qrText, {
            width: 450, margin: 1,
            color: { dark: '#111827', light: '#ffffff' },
            errorCorrectionLevel: 'M'
        }, (err, url) => {
            qrEl.src = (!err && url)
                ? url
                : `https://api.qrserver.com/v1/create-qr-code/?size=200x200&ecc=H&data=${encodeURIComponent(qrText)}`;
        });
    } else {
        qrEl.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&ecc=H&data=${encodeURIComponent(qrText)}`;
    }
}

window.addEventListener('load', cargarAsistentePorId);
</script>
