<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Credencial — Cámara de Comercio de Arauca</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.0/build/qrcode.min.js"></script>

    <style>
        :root {
            --verde: #007D42;
            --verde-claro: #009650;
            --verde-oscuro: #005c31;
            --bg: #f3f6f4;
            --texto: #0f172a;
            --texto-suave: #64748b;
            --borde: #e2e8f0;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 16px 48px;
        }

        /* ── HEADER ── */
        .site-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
            opacity: 0.7;
        }
        .site-header img { height: 28px; object-fit: contain; }
        .site-header span {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--verde);
        }

        /* ── ESTADOS ── */
        .estado-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 60px 24px;
            color: var(--texto-suave);
            text-align: center;
        }
        .estado-wrap i { font-size: 2.5rem; opacity: 0.3; }
        .estado-wrap p { font-size: 0.88rem; max-width: 280px; line-height: 1.6; }

        /* ── TARJETA CREDENCIAL ── */
        .credencial {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 48px rgba(0,0,0,0.10);
            border: 1px solid var(--borde);
        }

        .cred-banda { height: 6px; background: var(--verde); transition: background .3s; }

        .cred-header {
            background: var(--verde);
            color: #fff;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            transition: background .3s;
        }
        .cred-org {
            font-size: 8.5px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            opacity: 0.78;
            margin-bottom: 3px;
        }
        .cred-evento {
            font-size: 15px;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }
        .cred-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 6px;
        }
        .cred-meta span {
            font-size: 9.5px;
            opacity: 0.85;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .cred-logo {
            width: 46px; height: 46px;
            border-radius: 8px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; overflow: hidden;
        }
        .cred-logo img { max-width: 80%; max-height: 80%; object-fit: contain; filter: brightness(0) invert(1); }

        /* QR */
        .cred-qr-zona {
            background: #f8fafc;
            border-bottom: 1px solid var(--borde);
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .qr-frame {
            background: #fff;
            padding: 10px;
            border: 1px solid var(--borde);
            border-radius: 14px;
        }
        .qr-frame canvas, .qr-frame img { display: block; width: 200px !important; height: 200px !important; }
        .serial-lbl { font-size: 9px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.12em; }
        .serial-val {
            font-family: 'Courier New', monospace;
            font-size: 15px; font-weight: 700;
            color: var(--texto);
            background: #f1f5f9;
            padding: 4px 14px;
            border-radius: 8px;
            border: 1px solid var(--borde);
            letter-spacing: 0.2em;
        }

        /* Datos */
        .cred-datos {
            padding: 24px 20px 20px;
            text-align: center;
        }
        .perfil-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 14px 3px 9px;
            border-radius: 20px;
            background: var(--verde);
            color: #fff;
            font-size: 9.5px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 12px;
            transition: background .3s;
        }
        .perfil-pill i { font-size: 11px; }
        .cred-nombre {
            font-size: 22px;
            font-weight: 800;
            color: var(--texto);
            text-transform: uppercase;
            letter-spacing: -0.02em;
            line-height: 1.15;
            margin-bottom: 4px;
        }
        .cred-doc {
            font-size: 13px;
            font-weight: 700;
            color: #475569;
            margin-bottom: 4px;
        }
        .cred-empresa {
            font-size: 13px;
            color: var(--texto-suave);
            line-height: 1.4;
        }
        .cred-verificado {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid #f1f5f9;
            font-size: 9.5px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .cred-verificado i { color: var(--verde); font-size: 14px; transition: color .3s; }

        .cred-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 18px;
            background: #f8fafc;
            border-top: 1px solid var(--borde);
        }
        .ft-brand { font-size: 9px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.12em; }
        .ft-dom   { font-size: 9px; font-weight: 700; color: var(--verde); text-transform: uppercase; letter-spacing: 0.1em; transition: color .3s; }

        /* ── ACCIONES ── */
        .acciones {
            display: flex;
            gap: 10px;
            margin-top: 18px;
            width: 100%;
            max-width: 420px;
        }
        .btn-imprimir {
            flex: 1;
            padding: 12px 0;
            background: var(--verde);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 14px rgba(0,125,66,0.2);
            transition: background .2s, transform .15s, box-shadow .2s;
        }
        .btn-imprimir:hover { background: var(--verde-oscuro); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,125,66,0.3); }

        .btn-copiar {
            width: 46px; height: 46px;
            background: #fff;
            border: 1px solid var(--borde);
            border-radius: 50px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--texto-suave);
            font-size: 15px;
            transition: background .2s, color .2s;
        }
        .btn-copiar:hover { background: #f1f5f9; color: var(--verde); }

        /* Toast */
        .toast-msg {
            position: fixed;
            bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #0f172a; color: #fff;
            padding: 10px 22px;
            border-radius: 50px;
            font-size: 0.82rem;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s, transform .25s;
            z-index: 9999;
            white-space: nowrap;
        }
        .toast-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── PRINT ── */
        @media print {
            body { background: #fff; padding: 0; align-items: flex-start; }
            .site-header, .acciones, .toast-msg { display: none !important; }
            .credencial { box-shadow: none; border: 1px solid #ccc; border-radius: 12px; max-width: 100%; }
            @page { margin: 8mm; size: A5 portrait; }
        }
    </style>
</head>
<body>

    <div class="site-header">
        <img src="https://ccarauca.org.co/wp-content/uploads/2019/12/logo-camara-1-1-1.png" alt="Logo">
        <span>Cámara de Comercio de Arauca</span>
    </div>

    <!-- Estado: cargando -->
    <div id="estado-cargando" class="estado-wrap">
        <i class="fa-solid fa-spinner fa-spin" style="opacity:.5"></i>
        <p>Cargando tu credencial...</p>
    </div>

    <!-- Estado: error -->
    <div id="estado-error" class="estado-wrap" style="display:none">
        <i class="fa-solid fa-circle-exclamation"></i>
        <p id="error-msg">No se pudo encontrar la inscripción. Verifica el enlace recibido.</p>
    </div>

    <!-- Credencial -->
    <div class="credencial" id="credencial" style="display:none">
        <div class="cred-banda" id="c-banda"></div>
        <div class="cred-header" id="c-header">
            <div>
                <div class="cred-org">Cámara de Comercio de Arauca</div>
                <div class="cred-evento" id="c-evento">Conferencia IA</div>
                <div class="cred-meta">
                    <span id="c-fecha"><i class="fa-solid fa-calendar-days" style="font-size:9px"></i> —</span>
                    <span id="c-lugar"><i class="fa-solid fa-location-dot" style="font-size:9px"></i> —</span>
                </div>
            </div>
            <div class="cred-logo">
                <img src="https://ccarauca.org.co/wp-content/uploads/2019/12/logo-camara-1-1-1.png" alt="Logo">
            </div>
        </div>

        <div class="cred-qr-zona">
            <div class="qr-frame">
                <canvas id="c-qr-canvas"></canvas>
            </div>
            <span class="serial-lbl">Código de acceso</span>
            <span class="serial-val" id="c-serial">—</span>
        </div>

        <div class="cred-datos">
            <div class="perfil-pill" id="c-pill">
                <i class="fa-solid fa-user-check" id="c-pill-ico"></i>
                <span id="c-pill-lbl">Asistente General</span>
            </div>
            <div class="cred-nombre" id="c-nombre">NOMBRE COMPLETO</div>
            <div class="cred-doc" id="c-doc" style="display:none"></div>
            <div class="cred-empresa" id="c-empresa">Empresa</div>
            <div class="cred-verificado">
                <i class="fa-solid fa-shield-check" id="c-shield"></i>
                <span>Credencial verificada</span>
            </div>
        </div>

        <div class="cred-footer">
            <span class="ft-brand">Codatek · QR Control</span>
            <span class="ft-dom" id="c-dom">ccarauca.org.co</span>
        </div>
    </div>

    <!-- Acciones -->
    <div class="acciones" id="acciones" style="display:none">
        <button class="btn-imprimir" onclick="window.print()">
            <i class="fa-solid fa-print"></i> Imprimir / Guardar PDF
        </button>
        <button class="btn-copiar" id="btn-copiar" title="Copiar código">
            <i class="fa-regular fa-copy"></i>
        </button>
    </div>

    <div class="toast-msg" id="toast"></div>

    <script>
        const SUPABASE_URL      = "https://wrqvuidcstesrlkwxsfs.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndycXZ1aWRjc3Rlc3Jsa3d4c2ZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MDg1MjMsImV4cCI6MjA5NTk4NDUyM30.TFk0LkHHbrjZtZ5Dma36gSB2dtsv2aQF-lCS0_nTI9I";

        function toast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2200);
        }

        function mostrarError(msg) {
            document.getElementById('estado-cargando').style.display = 'none';
            document.getElementById('error-msg').textContent = msg || 'No se encontró la inscripción.';
            document.getElementById('estado-error').style.display = 'flex';
        }

        function perfilConfig(perfil_entrada) {
            const p = String(perfil_entrada || '').toLowerCase();
            if (p.includes('vip') || p.includes('especial') || p.includes('invitado')) {
                return { color: '#1d4ed8', etq: perfil_entrada || 'Invitado Especial', ico: 'fa-star' };
            }
            if (p.includes('medio') || p.includes('prensa') || p.includes('comunicaci')) {
                return { color: '#b45309', etq: perfil_entrada || 'Medios de Comunicación', ico: 'fa-camera' };
            }
            return { color: '#007D42', etq: perfil_entrada || 'Asistente General', ico: 'fa-user-check' };
        }

        function renderCredencial(a, evento) {
            document.getElementById('estado-cargando').style.display = 'none';

            const { color, etq, ico } = perfilConfig(a.perfil_entrada);

            // Color dinámico
            document.getElementById('c-banda').style.background  = color;
            document.getElementById('c-header').style.background = color;
            document.getElementById('c-pill').style.background   = color;
            document.getElementById('c-shield').style.color      = color;
            document.getElementById('c-dom').style.color         = color;
            document.getElementById('c-pill-ico').className = `fa-solid ${ico}`;
            document.getElementById('c-pill-lbl').textContent    = etq;

            // Datos del evento
            if (evento) {
                document.getElementById('c-evento').textContent = evento.nombre || 'Conferencia IA';
                if (evento.fecha) {
                    const f = new Date(evento.fecha + 'T00:00:00');
                    document.getElementById('c-fecha').innerHTML =
                        `<i class="fa-solid fa-calendar-days" style="font-size:9px"></i> ${f.toLocaleDateString('es-CO', { day:'numeric', month:'long', year:'numeric' })}`;
                }
                if (evento.lugar) {
                    document.getElementById('c-lugar').innerHTML =
                        `<i class="fa-solid fa-location-dot" style="font-size:9px"></i> ${evento.lugar}`;
                }
            }

            // Datos del asistente
            document.getElementById('c-nombre').textContent  = (a.nombre_completo || '').toUpperCase();
            document.getElementById('c-empresa').textContent = a.empresa_medio || 'Particular';
            document.getElementById('c-serial').textContent  = a.codigo_qr || '—';

            const docEl = document.getElementById('c-doc');
            if (a.documento) { docEl.textContent = a.documento; docEl.style.display = 'block'; }

            // QR
            const qrText = String(a.codigo_qr || '').trim();
            if (qrText && window.QRCode && typeof window.QRCode.toCanvas === 'function') {
                QRCode.toCanvas(
                    document.getElementById('c-qr-canvas'),
                    qrText,
                    { width: 200, margin: 1, color: { dark: '#111827', light: '#ffffff' }, errorCorrectionLevel: 'M' },
                    (err) => { if (err) console.warn('QR error:', err); }
                );
            }

            // Botón copiar
            document.getElementById('btn-copiar').onclick = () => {
                navigator.clipboard.writeText(a.codigo_qr).then(() => toast('Código copiado ✓'));
            };

            // Mostrar
            document.getElementById('credencial').style.display = 'block';
            document.getElementById('acciones').style.display   = 'flex';
        }

        async function cargar() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (!id) { mostrarError('El enlace no contiene un identificador válido.'); return; }

            try {
                const res = await fetch(
                    `${SUPABASE_URL}/rest/v1/inscritos?id=eq.${encodeURIComponent(id)}&select=*`,
                    {
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Accept': 'application/json'
                        }
                    }
                );

                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                if (!Array.isArray(data) || data.length === 0) {
                    mostrarError('No se encontró ninguna inscripción con este enlace.');
                    return;
                }

                const asistente = data[0];
                let evento = null;

                // Cargar datos del evento si existe event_id
                if (asistente.event_id) {
                    try {
                        const resEvento = await fetch(
                            `${SUPABASE_URL}/rest/v1/eventos?id=eq.${asistente.event_id}&select=nombre,fecha,lugar`,
                            {
                                headers: {
                                    'apikey': SUPABASE_ANON_KEY,
                                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                    'Accept': 'application/json'
                                }
                            }
                        );
                        const dataEvento = await resEvento.json();
                        if (Array.isArray(dataEvento) && dataEvento.length) evento = dataEvento[0];
                    } catch (e) { console.warn('No se cargó el evento:', e); }
                }

                renderCredencial(asistente, evento);

            } catch (err) {
                console.error(err);
                mostrarError('Error al conectar con el servidor. Intenta de nuevo más tarde.');
            }
        }

        window.addEventListener('load', cargar);
    </script>
</body>
</html>
